name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ghanahomes_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
      continue-on-error: true
    
    - name: Run migrations
      env:
        DEBUG: False
        SECRET_KEY: test-secret-key
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/ghanahomes_test
      run: |
        python manage.py migrate
    
    - name: Run tests with coverage
      env:
        DEBUG: False
        SECRET_KEY: test-secret-key
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/ghanahomes_test
      run: |
        coverage run --source='.' manage.py test
        coverage report --fail-under=70
    
    - name: Generate coverage report
      run: |
        coverage xml
      if: always()
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      if: always()

  security-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run Bandit security check
      run: |
        bandit -r accounts payments properties subscriptions chat -ll
      continue-on-error: true
    
    - name: Check for known vulnerabilities
      run: |
        pip install -r requirements.txt
        safety check || true
      continue-on-error: true

  quality-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint django-stubs
    
    - name: Check Django system check
      env:
        DEBUG: False
        SECRET_KEY: test-secret-key
      run: |
        python manage.py check
    
    - name: Check for migrations
      run: |
        python manage.py makemigrations --dry-run --check

  notify:
    runs-on: ubuntu-latest
    needs: [tests, security-check, quality-check]
    if: failure()
    
    steps:
    - name: Notify on failure
      run: |
        echo "CI Pipeline failed! Check the logs above for details."
      
