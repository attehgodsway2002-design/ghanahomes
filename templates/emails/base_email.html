<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GhanaHomes{% endblock %}</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f8f9fa;">
        <tr>
            <td style="padding: 20px;">
                <table width="600" cellpadding="0" cellspacing="0" style="margin: 0 auto; background-color: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                    <!-- Header -->
                    <tr>
                        <td style="background-color: #0d6efd; padding: 20px; text-align: center;">
                            <h1 style="color: white; margin: 0;">GhanaHomes</h1>
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    {% block content %}{% endblock %}
                    
                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #f8f9fa; padding: 20px; text-align: center; font-size: 12px; color: #6c757d;">
                            <p style="margin-bottom: 10px;">
                                This email was sent to {{ user.email }}. If you have any questions, please contact our support team.
                            </p>
                            <p style="margin: 0;">
                                © {% now "Y" %} <strong>Huntsmen</strong>. All rights reserved. | Powered by GhanaHomes Platform
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
